services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_services &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      POSTGRES_DB: ${POSTGRES_DB:-salon}
      POSTGRES_USER: ${POSTGRES_USER:-salon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salon}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salon}
      POSTGRES_USER: ${POSTGRES_USER:-salon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salon} -d ${POSTGRES_DB:-salon}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.30.20.0/24
